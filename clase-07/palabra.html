<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Proyectos de Título</title>
        <link href="style.css" rel="stylesheet" />
    </head>
    <body>
        <header>
            <h1>Memorias agrupadas por palabra: <span id="palabra"></span></h1>
            <select>
                <option>Diseñador</option>
                <option>Diseñador con mención en Visualidad y Medios</option>
                <option>Diseñador con mención Industrial y Servicios</option>
                <option>Diseñadora</option>
                <option>Diseñadora con mención en Visualidad y Medios</option>
                <option>Diseñadora con mención Industrial y Servicios</option>
            </select>
        </header>
        <main>
            <h2></h2>
            <table>
                <thead>
                    <th>Egresado/a</th>
                    <th>Prof. Guía</th>
                    <th>Semestre</th>
                    <th>Proyecto</th>
                    <th>Nota</th>
                </thead>
                <tbody id="mencion"></tbody>
            </table>

            <div id="palabreo"></div>

            <button onclick="location.href='index.html'">Ver Memorias agrupadas por Título Profesional</button>
        </main>
        <footer>
            <p><small><a href="https://github.com/profesorfaco/troncal" target="_blank">Diseño y visualización de información</a> | Este ejercicio, preparado por <a rel="cc:attributionURL dct:creator" property="cc:attributionName" href="https://github.com/profesorfaco">profesorfaco</a>, es publicado bajo licencia <a href="https://creativecommons.org/licenses/by-nc/4.0/?ref=chooser-v1" target="_blank" rel="license noopener noreferrer">CC BY-NC 4.0</a></small></p></p>
        </footer>
        <script>
            const resumen = document.querySelector("h2");
            const tabla = document.querySelector("#mencion");
            const palabreo = document.querySelector("#palabreo");

            var palabra = new URLSearchParams(window.location.search).get('data');

            async function datos(criterio) {
                var seleccion = [];
                var notas = [];
                const consulta = await fetch("https://raw.githubusercontent.com/profesorfaco/troncal/refs/heads/main/clase-07/titulades.json");
                const data = await consulta.json();
                console.log("Lo que sigue son todos los datos:");
                console.log(data);

                //Creo una selección, basándome en el selector
                data.forEach((d) => {
                    if (d.proyecto.includes(criterio)) {
                        seleccion.push(d);
                    }
                });

                //Ordeno la selección por nombre de tituladas/os
                seleccion.sort(function (a, b) {
                    if (a.nombre < b.nombre) {
                        return -1;
                    }
                    if (a.nombre > b.nombre) {
                        return 1;
                    }
                    return 0;
                });

                //Genero una tabla que muestre la selección ya ordenada
                seleccion.forEach((s, i) => {
                    tabla.innerHTML += `<tr><td>${s.nombre}</td><td>${s.profeGuia}</td><td>${s.semestreExamen}</td><td><a href="${s.repositorioAcademico}" target="_blank">${
                        s.proyecto
                    }</a></td><td class="text-center">${s.notaExamen.toFixed(1)}</td></tr>`;
                    notas.push(s.notaExamen);
                });

                //Saco un promedio de las notas en la tabla
                var i = 0;
                var total = 0;
                notas.forEach((n) => {
                    total += n;
                    i++;
                });
                var corte = (total / i).toFixed(1);

                console.log(corte);

                if (notas.length == 1) {
                    resumen.innerHTML = `<em>${corte}</em> es la calificación del proyecto en este grupo:`;
                } else {
                    resumen.innerHTML = `<em>${corte}</em> es la calificación promedio de los <em>${notas.length}</em> proyectos en este grupo:`;
                }

                //Buscando las palabras frecuentes del "para qué" en su selección
                var words = "";
                seleccion.forEach((s) => {
                    s.proyecto = s.proyecto.replace(".", "");
                    s.proyecto = s.proyecto.toLowerCase();
                    words = words + " " + s.proyecto;
                });
                var palabras = words.split(" ");
                palabras = palabras.sort();
                const nopalabras = ["",":","a","al","ante","así","base","basado","como","con","contra","de","De","del","dentro","desde","e","el","El","en","entre","esta","este","esto","estos","fin","hacia","la","las","le","les","lo","los","más","mediante","no","o","para","por","que","qué","se","sin","sobre","son","su","sus","tanto","través","un","una","unas","unos","vez","y","Una","bajo","partir","puesta"];
                const sacaPalabras = (arreglo, sacar) => {
                    return arreglo.filter((palabra) => {
                        return !sacar.includes(palabra);
                    });
                };
                var palabrasAcotadas = sacaPalabras(palabras, nopalabras);
                const cuentaRepeticiones = (arreglo = []) => {
                    const resultado = [];
                    arreglo.forEach((el) => {
                        const index = resultado.findIndex((obj) => {
                            return obj["name"] === el;
                        });
                        if (index === -1) {
                            resultado.push({
                                name: el,
                                count: 1,
                            });
                        } else {
                            resultado[index]["count"]++;
                        }
                    });
                    return resultado;
                };
                var total = cuentaRepeticiones(palabrasAcotadas);
                var texto = "";
                total.forEach((x) => {
                    if (x.count > 1) {
                        texto = texto + `<span><em>${x.name}</em> (${x.count} veces)</span> `;
                    }
                });
                if (texto) {
                    palabreo.innerHTML = `<p>Se revisan los nombres de los proyectos en el grupo buscando palabras repetidas (omitiendo artículos, adverbios, preposiciones y conjunciones). El resultado:</p>
                        <p>${texto}</p>`;
                } else {
                    palabreo.innerHTML = `<p>Se revisan los nombres de los proyectos en el grupo, pero <em>no</em> se encuentran palabras repetidas.</p>`;
                }
            }

            datos(palabra).catch((error) => console.error(error));

            document.querySelectorAll("select")[0].addEventListener("change", (event) => {
                tabla.innerHTML = " ";
                palabreo.innerHTML = " ";
                console.clear();
                var seleccion = [];
                var notas = [];
                datos(event.target.value).catch((error) => console.error(error));
            });
        </script>
    </body>
</html>
